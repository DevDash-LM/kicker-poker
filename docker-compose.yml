# Fixed project name: the network (kicker_default) and container names stay
# identical no matter which folder you deploy from — so Caddy keeps resolving it.
name: kicker

services:
  kicker:
    build:
      context: .
      # Accounts: a .env file dropped next to this compose file is auto-read by
      # Docker Compose and inlined into the client at build time (Vite VITE_*).
      # Leave the .env out and the app builds guest-only. The anon key is public
      # by design (protected by Row Level Security).
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    image: kicker
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:8787"
    # The game server also needs Supabase at RUNTIME to verify signed-in
    # players on room create/join (server/auth.js). Same public anon values
    # as the build args; leave blank and every player is treated as a guest.
    environment:
      SUPABASE_URL: ${VITE_SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
